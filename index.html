<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVE TALK · 私语</title>
    <style>
        /* LOVE TALK 专属色系 — 更紧凑尺寸，独立滑动区，头像居中，支持多条发送 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #F0F2F0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a5a5a;
            padding: 6px;
        }

        .love-talk {
            max-width: 380px;
            width: 100%;
            height: 100%;
            max-height: 720px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(3px);
            border-radius: 22px;
            box-shadow: 0 12px 28px -8px rgba(95, 95, 95, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(209, 209, 209, 0.5);
        }

        /* 头部 */
        .chat-header {
            padding: 8px 14px 6px 14px;
            background-color: rgba(210, 230, 236, 0.85);
            border-bottom: 1px solid #d1d1d1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 6px;
            backdrop-filter: blur(2px);
            flex-shrink: 0;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: flex-start;
            margin-left: 30px;
        }

        .avatar-container {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #e1b2b2;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #dbe5f1;
            color: #1f5f6e;
            font-size: 1.2rem;
            font-weight: 500;
        }

        #avatarUpload { display: none; }

        .info-area {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .nickname-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        #nicknameDisplay {
            font-size: 1rem;
            font-weight: 550;
            color: #1f5f6e;
            white-space: nowrap;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .edit-nickname {
            background: none;
            border: none;
            color: #8a8a8a;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 10px;
        }

        .status-display {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            margin-top: 2px;
        }

        #currentStatus {
            background-color: #e1b2b2;
            padding: 2px 8px;
            border-radius: 30px;
            color: #5a5a5a;
            border: 1px solid #d1d1d1;
            white-space: nowrap;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .settings-icon {
            width: 36px;
            height: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            border-radius: 30px;
            transition: background-color 0.1s;
            flex-shrink: 0;
        }

        .settings-icon:hover { background-color: rgba(225, 178, 178, 0.5); }
        .settings-icon.active { background-color: rgba(225, 178, 178, 0.8); }
        .bar { width: 20px; height: 2px; background-color: #5a5a5a; border-radius: 2px; }

        .settings-panel {
            background-color: rgba(210, 230, 236, 0.95);
            border-bottom: 1px solid #d1d1d1;
            padding: 0 14px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out, padding 0.2s ease;
            backdrop-filter: blur(2px);
            flex-shrink: 0;
        }

        .settings-panel.open {
            max-height: 550px;
            padding: 14px 14px 16px 14px;
        }

        .settings-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid #d1d1d1;
            padding-bottom: 6px;
        }

        .settings-tab {
            padding: 4px 0;
            font-size: 0.75rem;
            color: #5a5a5a;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .settings-tab.active {
            color: #1f5f6e;
            border-bottom: 2px solid #1f5f6e;
            font-weight: 550;
        }

        /* 滑块样式 */
        .slider-container { margin: 10px 0; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px; }
        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #d1d1d1;
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e1b2b2;
            cursor: pointer;
            border: 1px solid #d1d1d1;
        }
        .frequency-value { font-weight: 550; color: #1f5f6e; }

        /* 备份区域 */
        .backup-section { margin-top: 12px; padding-top: 10px; border-top: 1px dashed #d1d1d1; }
        .backup-buttons { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .small-btn {
            background-color: #e1b2b2;
            border: 1px solid #d1d1d1;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: #5a5a5a;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .lexicon-content, .image-lexicon-content, .history-content, .frequency-content, .backup-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lexicon-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
        }

        .lexicon-label span {
            background-color: #e1b2b2;
            padding: 2px 7px;
            border-radius: 30px;
            border: 1px solid #d1d1d1;
            font-size: 0.65rem;
        }

        .lexicon-textarea {
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid #d1d1d1;
            border-radius: 14px;
            padding: 10px 12px;
            font-size: 0.8rem;
            resize: vertical;
            min-height: 120px;
            max-height: 160px;
            font-family: inherit;
            outline: none;
        }

        .lexicon-actions { display: flex; gap: 8px; }
        .add-card-btn, .remove-card-btn, .add-image-btn {
            background-color: #e1b2b2;
            border: 1px solid #d1d1d1;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.7rem;
            cursor: pointer;
            text-align: center;
            flex: 1;
        }

        .image-list {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background-color: rgba(255,255,255,0.4);
            border-radius: 14px;
            padding: 8px;
        }

        .image-preview-item {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e1b2b2;
        }

        .image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .delete-image-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            background-color: #e1b2b2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 10px 8px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .message-row { display: flex; width: 100%; }
        .message-row.opponent { justify-content: flex-start; }
        .message-row.self { justify-content: flex-end; }

        .bubble {
            max-width: 72%;
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 0.82rem;
            word-wrap: break-word;
            box-shadow: 0 2px 4px rgba(90, 90, 90, 0.05);
            border: 1px solid rgba(209, 209, 209, 0.4);
        }

        .bubble-image {
            max-width: 180px;
            max-height: 180px;
            border-radius: 12px;
            display: block;
        }

        .self .bubble { background-color: rgba(241, 214, 214, 0.9); border-bottom-right-radius: 4px; }
        .opponent .bubble { background-color: rgba(219, 229, 241, 0.9); border-bottom-left-radius: 4px; }

        .message-meta {
            display: flex;
            gap: 3px;
            font-size: 0.55rem;
            margin-top: 3px;
            color: #8a8a8a;
        }

        .opponent .message-meta { justify-content: flex-start; }
        .self .message-meta { justify-content: flex-end; }

        .chat-input-area {
            padding: 8px 12px 10px;
            background-color: rgba(210, 230, 236, 0.6);
            border-top: 1px solid #d1d1d1;
            display: flex;
            gap: 6px;
            align-items: flex-end;
        }

        .image-upload-btn {
            background-color: #e1b2b2;
            border: 1px solid #d1d1d1;
            border-radius: 30px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .message-field {
            flex: 1;
            border: 1px solid #d1d1d1;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 22px;
            padding: 8px 14px;
            font-size: 0.85rem;
            resize: none;
            max-height: 80px;
            min-height: 36px;
            font-family: inherit;
            outline: none;
        }

        .send-button {
            background-color: #e1b2b2;
            border: 1px solid #d1d1d1;
            border-radius: 30px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .privacy-note {
            text-align: center;
            font-size: 0.5rem;
            color: #8a8a8a;
            padding: 3px 0;
            background-color: rgba(210, 230, 236, 0.5);
            border-top: 1px solid #d1d1d1;
        }

        .empty-chat-hint {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #8a8a8a;
            font-size: 0.85rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="love-talk">
        <div class="chat-header">
            <div class="profile-area">

                </div>
                <input type="file" id="avatarUpload" accept="image/*">
                <div class="info-area">
                    <div class="nickname-row">
                        <span id="nicknameDisplay">秦彻</span>
                        <button class="edit-nickname" id="editNicknameBtn">✎</button>
                    </div>
                    <div class="status-display"><span id="currentStatus">在线</span></div>
                </div>
            </div>
            <div class="settings-icon" id="settingsIcon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        </div>

        <div class="settings-panel" id="settingsPanel">

                <div class="settings-tab" id="tabImageLexicon">🖼️ 图片词条</div>

                <div class="settings-tab" id="tabBackup">💾 备份/导入</div>
            </div>

            <!-- 文字词条库 - 已替换为新的内容 -->
            <div id="lexiconContent" class="lexicon-content" style="display: flex;">

                <textarea class="lexicon-textarea" id="lexiconTextarea"></textarea>
                <div class="lexicon-actions">
                    <button class="add-card-btn" id="addCardBtn">➕ 添加</button>
                    <button class="remove-card-btn" id="removeCardBtn">➖ 删除最后</button>
                </div>
                <div class="lexicon-hint"><span>✨ 随机1-3条</span><span class="save-hint" id="lexiconCount">加载中</span></div>
            </div>

            <!-- 图片词条库 -->
            <div id="imageLexiconContent" class="image-lexicon-content" style="display: none;">
                <div class="lexicon-label"><span>对方可发送的图片</span><span>随机发1张</span></div>
                <div class="image-list" id="imageListContainer"></div>
                <input type="file" id="addImageInput" accept="image/*" style="display: none;">
                <button class="add-image-btn" id="addImageBtn">➕ 添加图片到词条库</button>
                <div class="image-hint">✨ 对方回复时随机发图(30%概率)</div>
            </div>

            <!-- 频率调节 -->
            <div id="frequencyContent" class="frequency-content" style="display: none;">
                <div class="slider-container">
                    <div class="slider-label"><span>⏰ 回复间隔</span><span class="frequency-value" id="frequencyValue">5 秒</span></div>
                    <input type="range" id="frequencySlider" min="5" max="60" value="5" step="1">
                    <div class="slider-label"><span>⚡ 滑块拖动即可实时生效</span><span>5秒 ↔ 60秒</span></div>
                </div>
                <div class="lexicon-label"><span>💡 调节后下次回复即按新间隔</span></div>
            </div>

            <!-- 备份/导入 -->
            <div id="backupContent" class="backup-content" style="display: none;">
                <div class="lexicon-label"><span>📦 完整聊天记录备份</span><span>JSON格式 | 不丢失任何内容</span></div>
                <div class="backup-buttons">
                    <button class="small-btn" id="exportFullBtn">📤 导出完整备份</button>
                    <button class="small-btn" id="importFullBtn">📥 导入备份文件</button>
                </div>
                <div class="backup-section">
                    <div class="lexicon-label"><span>📄 导出纯文本记录</span><span>可读的txt文件</span></div>
                    <div class="backup-buttons">
                        <button class="small-btn" id="saveChatBtn">💾 导出为txt</button>
                        <button class="small-btn" id="clearChatBtn">🗑️ 清空记录</button>
                    </div>
                </div>
                <div class="image-hint">✨ 完整备份为JSON格式，可完美恢复全部聊天记录、图片、文字。</div>
            </div>
        </div>

        <div class="chat-messages" id="messageContainer"></div>

        <div class="chat-input-area">
            <div class="image-upload-btn" id="imageUploadBtn">📷</div>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <textarea class="message-field" id="messageInput" placeholder="给对面的人..." rows="1"></textarea>
            <div class="send-button" id="sendButton">↑</div>
        </div>
        <div class="privacy-note">❤️ LOVE TALK · 支持图片 · 频率可调 · 完整备份</div>
    </div>

            // 频率
            function loadDelay() {
                const saved = localStorage.getItem(STORAGE_KEYS.DELAY);
                if (saved) {
                    replyDelaySec = parseInt(saved, 10);
                    if (isNaN(replyDelaySec) || replyDelaySec < 5) replyDelaySec = 5;
                    if (replyDelaySec > 60) replyDelaySec = 60;
                }
                frequencySlider.value = replyDelaySec;
                frequencyValue.innerText = replyDelaySec + ' 秒';
            }
            function saveDelay() { localStorage.setItem(STORAGE_KEYS.DELAY, replyDelaySec); }
            frequencySlider.addEventListener('input', (e) => {
                replyDelaySec = parseInt(e.target.value, 10);
                frequencyValue.innerText = replyDelaySec + ' 秒';
                saveDelay();
            });

            // 选项卡切换
            function switchTab(activeTab) {
                [tabLexicon, tabImageLexicon, tabFrequency, tabBackup].forEach(t => t.classList.remove('active'));
                activeTab.classList.add('active');
                lexiconContent.style.display = 'none';
                imageLexiconContent.style.display = 'none';
                frequencyContent.style.display = 'none';
                backupContent.style.display = 'none';
                if (activeTab === tabLexicon) lexiconContent.style.display = 'flex';
                else if (activeTab === tabImageLexicon) imageLexiconContent.style.display = 'flex';
                else if (activeTab === tabFrequency) frequencyContent.style.display = 'flex';
                else if (activeTab === tabBackup) backupContent.style.display = 'flex';
            }
            tabLexicon.addEventListener('click', () => switchTab(tabLexicon));
            tabImageLexicon.addEventListener('click', () => switchTab(tabImageLexicon));
            tabFrequency.addEventListener('click', () => switchTab(tabFrequency));
            tabBackup.addEventListener('click', () => switchTab(tabBackup));
            settingsIcon.addEventListener('click', () => {
                settingsPanel.classList.toggle('open');
                settingsIcon.classList.toggle('active');
            });

            // 图片词条库管理
            function renderImageList() {
                imageListContainer.innerHTML = '';
                imagePhrases.forEach((imgSrc, idx) => {
                    const div = document.createElement('div');
                    div.className = 'image-preview-item';
                    div.innerHTML = `<img src="${imgSrc}"><div class="delete-image-btn" data-index="${idx}">✕</div>`;
                    imageListContainer.appendChild(div);
                });
                document.querySelectorAll('.delete-image-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(btn.dataset.index);
                        imagePhrases.splice(idx, 1);
                        saveImages();
                        renderImageList();
                    });
                });
            }
            function saveImages() { localStorage.setItem(STORAGE_KEYS.IMAGES, JSON.stringify(imagePhrases)); }
            function loadImages() {
                const saved = localStorage.getItem(STORAGE_KEYS.IMAGES);
                if (saved) try { imagePhrases = JSON.parse(saved) || []; } catch(e) { imagePhrases = []; }
                renderImageList();
            }
            addImageBtn.addEventListener('click', () => addImageInput.click());
            addImageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        imagePhrases.push(ev.target.result);
                        saveImages();
                        renderImageList();
                    };
                    reader.readAsDataURL(file);
                }
                addImageInput.value = '';
            });

            // 备份与导入
            function exportFullBackup() {
                const backup = {
                    version: '1.0',
                    exportTime: new Date().toISOString(),
                    messages: messages,
                    nickname: nicknameDisplay.textContent,
                    status: currentStatus.textContent,
                    lexicon: lexiconTextarea.value,
                    images: imagePhrases,
                    delay: replyDelaySec
                };
                const dataStr = JSON.stringify(backup, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `LOVE_TALK_backup_${new Date().toISOString().slice(0,19)}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
            function importFullBackup() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const backup = JSON.parse(ev.target.result);
                            if (backup.messages) messages = backup.messages;
                            if (backup.nickname) nicknameDisplay.textContent = backup.nickname;
                            if (backup.status) currentStatus.textContent = backup.status;
                            if (backup.lexicon) lexiconTextarea.value = backup.lexicon;
                            if (backup.images) imagePhrases = backup.images;
                            if (backup.delay) { replyDelaySec = backup.delay; frequencySlider.value = replyDelaySec; frequencyValue.innerText = replyDelaySec + ' 秒'; saveDelay(); }
                            localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify(messages));
                            localStorage.setItem(STORAGE_KEYS.NICKNAME, nicknameDisplay.textContent);
                            localStorage.setItem(STORAGE_KEYS.STATUS, currentStatus.textContent);
                            localStorage.setItem(STORAGE_KEYS.LEXICON, lexiconTextarea.value);
                            saveImages();
                            saveDelay();
                            updateLexiconFromTextarea();
                            renderImageList();
                            messageContainer.innerHTML = '';
                            messages.forEach(msg => {
                                if (msg.type === 'image') messageContainer.appendChild(createImageMessageBubble(msg.data, msg.sender, msg.time));
                                else messageContainer.appendChild(createMessageBubble(msg.text, msg.sender, msg.time));
                            });
                            if (messages.length === 0) showEmptyHint(); else hideEmptyHint();
                            scrollToBottom(false);
                            alert('导入成功！已恢复全部聊天记录和设置。');
                        } catch(e) { alert('备份文件格式错误，请选择正确的.json文件'); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
            exportFullBtn.addEventListener('click', exportFullBackup);
            importFullBtn.addEventListener('click', importFullBackup);

            function saveChatToFile() {
                if (messages.length === 0) { alert('暂无消息可保存'); return; }
                let chatText = `LOVE TALK 聊天记录\n保存时间：${new Date().toLocaleString()}\n对方昵称：${nicknameDisplay.textContent}\n对方状态：${currentStatus.textContent}\n================================\n\n`;
                messages.forEach(msg => {
                    const sender = msg.sender === SELF_ID ? '我' : nicknameDisplay.textContent;
                    if (msg.type === 'image') chatText += `[${msg.time}] ${sender}：📷 发送了一张图片\n`;
                    else chatText += `[${msg.time}] ${sender}：${msg.text}\n`;
                });
                const blob = new Blob([chatText], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `LOVE_TALK_${new Date().toISOString().slice(0,10)}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
            function clearAllMessages() {
                if (confirm('确定要清空所有聊天记录吗？')) {
                    messages = [];
                    localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify(messages));
                    messageContainer.innerHTML = '';
                    showEmptyHint();
                }
            }
            function updateHistoryStats() {}

            // 基础函数
            function showEmptyHint() {
                if (!document.getElementById('emptyHint')) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'empty-chat-hint';
                    emptyDiv.id = 'emptyHint';
                    emptyDiv.textContent = '💬 写下第一句悄悄话';
                    messageContainer.appendChild(emptyDiv);
                }
            }
            function hideEmptyHint() { const h = document.getElementById('emptyHint'); if (h) h.remove(); }
            function getCurrentTime() { const d = new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
            function scrollToBottom() { requestAnimationFrame(() => messageContainer.scrollTop = messageContainer.scrollHeight); }
            
            function createMessageBubble(text, sender, savedTime) {
                const isSelf = sender === SELF_ID;
                const time = savedTime || getCurrentTime();
                const row = document.createElement('div');
                row.className = 'message-row ' + (isSelf ? 'self' : 'opponent');
                const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;
                const meta = document.createElement('div'); meta.className = 'message-meta';
                const timeSpan = document.createElement('span'); timeSpan.className = 'time-stamp'; timeSpan.textContent = time;
                const dot = document.createElement('span'); dot.className = 'status-dot';
                if (isSelf) { meta.appendChild(timeSpan); meta.appendChild(dot); } else { meta.appendChild(dot); meta.appendChild(timeSpan); }
                bubble.appendChild(meta); row.appendChild(bubble); return row;
            }
            function createImageMessageBubble(data, sender, savedTime) {
                const isSelf = sender === SELF_ID;
                const time = savedTime || getCurrentTime();
                const row = document.createElement('div');
                row.className = 'message-row ' + (isSelf ? 'self' : 'opponent');
                const bubble = document.createElement('div'); bubble.className = 'bubble';
                const img = document.createElement('img'); img.src = data; img.className = 'bubble-image';
                bubble.appendChild(img);
                const meta = document.createElement('div'); meta.className = 'message-meta';
                const timeSpan = document.createElement('span'); timeSpan.className = 'time-stamp'; timeSpan.textContent = time;
                const dot = document.createElement('span'); dot.className = 'status-dot';
                if (isSelf) { meta.appendChild(timeSpan); meta.appendChild(dot); } else { meta.appendChild(dot); meta.appendChild(timeSpan); }
                bubble.appendChild(meta); row.appendChild(bubble); return row;
            }
            function appendImageMessage(data, sender, shouldSave = true) {
                hideEmptyHint();
                const time = getCurrentTime();
                const msgEl = createImageMessageBubble(data, sender, time);
                messageContainer.appendChild(msgEl);
                if (shouldSave) { messages.push({ type: 'image', data, sender, time }); localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify(messages)); }
                scrollToBottom();
            }
            function appendTextMessage(text, sender, shouldSave = true) {
                hideEmptyHint();
                const time = getCurrentTime();
                const msgEl = createMessageBubble(text, sender, time);
                messageContainer.appendChild(msgEl);
                if (shouldSave) { messages.push({ type: 'text', text, sender, time }); localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify(messages)); }
                scrollToBottom();
            }

            function getRandomPhrases() {
                if (!replyPhrases.length) return ['...'];
                const count = Math.floor(Math.random() * 3) + 1;
                const shuffled = [...replyPhrases].sort(() => Math.random() - 0.5);
                return shuffled.slice(0, count);
            }
            function simulateOpponentReply() {
                const shouldSendImage = imagePhrases.length > 0 && Math.random() < 0.3;
                if (shouldSendImage) {
                    const randomImg = imagePhrases[Math.floor(Math.random() * imagePhrases.length)];
                    appendImageMessage(randomImg, OTHER_ID, true);
                } else {
                    const textList = getRandomPhrases();
                    let delay = 0;
                    textList.forEach((txt, idx) => {
                        setTimeout(() => appendTextMessage(txt, OTHER_ID, true), delay);
                        delay += 600;
                    });
                }
            }
            let opponentTimer = null;
            function scheduleOpponentReply() {
                if (opponentTimer) clearTimeout(opponentTimer);
                const delayMs = replyDelaySec * 1000;
                opponentTimer = setTimeout(() => {
                    simulateOpponentReply();
                    opponentTimer = null;
                }, delayMs);
            }

            function sendSelfText() {
                const raw = messageInput.value.trim();
                if (raw === '') return;
                appendTextMessage(raw, SELF_ID, true);
                messageInput.value = '';
                messageInput.style.height = 'auto';
                scheduleOpponentReply();
            }
            function sendSelfImage(dataUrl) {
                if (!dataUrl) return;
                appendImageMessage(dataUrl, SELF_ID, true);
                scheduleOpponentReply();
            }
            
            imageUploadBtn.addEventListener('click', () => imageInput.click());
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => sendSelfImage(ev.target.result);
                    reader.readAsDataURL(file);
                }
                imageInput.value = '';
            });
            sendButton.addEventListener('click', () => sendSelfText());
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendSelfText(); }
            });
            messageInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(80, this.scrollHeight) + 'px'; });

            // 头像、昵称、词条库
            function loadAvatar() { const saved = localStorage.getItem(STORAGE_KEYS.AVATAR); if (saved) { avatarImage.src = saved; avatarImage.style.display = 'block'; avatarPlaceholder.style.display = 'none'; } }
            avatarContainer.addEventListener('click', () => avatarUpload.click());
            avatarUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) { const reader = new FileReader(); reader.onload = (ev) => { const d = ev.target.result; avatarImage.src = d; avatarImage.style.display = 'block'; avatarPlaceholder.style.display = 'none'; localStorage.setItem(STORAGE_KEYS.AVATAR, d); }; reader.readAsDataURL(file); }
            });
            function loadNickname() { const saved = localStorage.getItem(STORAGE_KEYS.NICKNAME); if (saved) nicknameDisplay.textContent = saved; }
            editNicknameBtn.addEventListener('click', () => { const nn = prompt('新昵称', nicknameDisplay.textContent); if (nn && nn.trim()) { nicknameDisplay.textContent = nn.trim(); localStorage.setItem(STORAGE_KEYS.NICKNAME, nn.trim()); } });
            const statusList = ['开会', '出任务', '在剧院', '在拍卖会', '修武器', '看书', '休息', '健身', '泡澡', '在想你'];
            function setRandomStatus() { const saved = localStorage.getItem(STORAGE_KEYS.STATUS); if (saved) currentStatus.textContent = saved; else { const ns = statusList[Math.floor(Math.random() * statusList.length)]; currentStatus.textContent = ns; localStorage.setItem(STORAGE_KEYS.STATUS, ns); } }
            setRandomStatus();
            function loadLexicon() { 
                const saved = localStorage.getItem(STORAGE_KEYS.LEXICON); 
                if (saved) lexiconTextarea.value = saved; 
                else lexiconTextarea.value = DEFAULT_LEXICON; 
                updateLexiconFromTextarea(); 
            }
            function cleanPhrase(l) { return l.replace(/^[\d\s]*[.\．、\s]*/, '').trim(); }
            function updateLexiconFromTextarea() {
                const lines = lexiconTextarea.value.split('\n').map(l => l.trim()).filter(l => l && !/^[\s\-\—\=\_]+$/.test(l)).map(l => cleanPhrase(l)).filter(l => l);
                replyPhrases = [...new Set(lines)];
                if (replyPhrases.length === 0) replyPhrases = ['❤️'];
                lexiconCountSpan.innerText = replyPhrases.length + ' 条';
                localStorage.setItem(STORAGE_KEYS.LEXICON, lexiconTextarea.value);
            }
            lexiconTextarea.addEventListener('input', updateLexiconFromTextarea);
            addCardBtn.addEventListener('click', () => { const c = prompt('新字卡'); if (c && c.trim()) { lexiconTextarea.value += (lexiconTextarea.value.endsWith('\n')?'':'\n') + c.trim(); updateLexiconFromTextarea(); } });
            removeCardBtn.addEventListener('click', () => { const lines = lexiconTextarea.value.split('\n'); for(let i=lines.length-1;i>=0;i--) if(lines[i].trim() && !/^[\s\-\—\=\_]+$/.test(lines[i].trim())) { lines.splice(i,1); break; } lexiconTextarea.value = lines.join('\n'); updateLexiconFromTextarea(); });

            function loadMessagesFromStorage() {
                const saved = localStorage.getItem(STORAGE_KEYS.MESSAGES);
                if (saved) try { messages = JSON.parse(saved) || []; } catch(e) { messages = []; }
                messageContainer.innerHTML = '';
                if (messages.length === 0) showEmptyHint(); else hideEmptyHint();
                messages.forEach(msg => {
                    if (msg.type === 'image') messageContainer.appendChild(createImageMessageBubble(msg.data, msg.sender, msg.time));
                    else messageContainer.appendChild(createMessageBubble(msg.text, msg.sender, msg.time));
                });
                scrollToBottom();
            }

            saveChatBtn.addEventListener('click', saveChatToFile);
            clearChatBtn.addEventListener('click', clearAllMessages);
            
            loadNickname();
            loadAvatar();
            loadLexicon();
            loadImages();
            loadDelay();
            loadMessagesFromStorage();
            setTimeout(() => { if (messages.length === 0) { hideEmptyHint(); simulateOpponentReply(); } }, 1500);
            messageInput.focus();
        })();
    </script>
